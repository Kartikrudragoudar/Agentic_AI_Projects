version: "3.9"

services:

  # ── Always Running (24/7) ──────────────────────────────

  scheduler:
    build: ./agents/scheduler
    container_name: agent_scheduler
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
      - /home/kartik-rudragoudar/Kartik_DOC/Python_Programs/Projects/Project3:/home/kartik-rudragoudar/Kartik_DOC/Python_Programs/Projects/Project3
    working_dir: /home/kartik-rudragoudar/Kartik_DOC/Python_Programs/Projects/Project3
    command: ["python", "agents/scheduler/app.py"]
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: stock_backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./output:/output
    restart: unless-stopped

  # ── Run-Once Pipeline Agents (triggered by scheduler) ──

  fetcher:
    build: ./agents/fetcher
    container_name: agent_fetcher
    env_file: .env
    volumes:
      - ./data:/data
    restart: "no"
    profiles: ["pipeline"]

  sentiment:
    build: ./agents/sentiment
    container_name: agent_sentiment
    env_file: .env
    volumes:
      - ./data:/data
    deploy:
      resources:
        limits:
          memory: 512M
    restart: "no"
    profiles: ["pipeline"]

  scorer:
    build: ./agents/scorer
    container_name: agent_scorer
    volumes:
      - ./data:/data
    restart: "no"
    profiles: ["pipeline"]

  formatter:
    build: ./agents/formatter
    container_name: agent_formatter
    env_file: .env
    volumes:
      - ./data:/data
      - ./output:/output
    restart: "no"
    profiles: ["pipeline"]
